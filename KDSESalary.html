<!DOCTYPE html>
<html>
<head>
<title>KDSE Salary Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#333;
}

/* LOGIN */
.login{
width:350px;
margin:120px auto;
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login input{
width:100%;
padding:10px;
margin-top:10px;
}

.login button{
width:100%;
padding:10px;
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
}

/* HEADER */
.header{
background:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:10px;
margin:15px;
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* TABLE */
table{
width:100%;
background:white;
margin:15px;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

/* BUTTONS */
.btn{
padding:8px 12px;
border:none;
cursor:pointer;
border-radius:6px;
}

.btn-blue{background:#4f46e5;color:white;}
.btn-green{background:#16a34a;color:white;}
.btn-red{background:#dc2626;color:white;}

.chart-box{
background:white;
margin:15px;
padding:20px;
border-radius:12px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login">
<h2>🔐 KDSE ADMIN LOGIN</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="header">
<h2>📊 KDSE Salary Dashboard PRO</h2>

<div>
<button class="btn btn-green" onclick="downloadMonthlyPDF()">Monthly Report PDF</button>
<button class="btn btn-blue" onclick="refreshData()">Refresh</button>
</div>

</div>

<!-- CARDS -->
<div class="grid">
<div class="card"><h3>Total Teachers</h3><p id="t1">0</p></div>
<div class="card"><h3>Total Paid</h3><p id="t2">0</p></div>
<div class="card"><h3>Total Pending</h3><p id="t3">0</p></div>
<div class="card"><h3>Records</h3><p id="t4">0</p></div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Month</th>
<th>Salary</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- CHART -->
<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwPO0IZt7RtqmTMjyv425TEV97nU593WO2ldIm3y7gjmx9mWE1uH7qpodtLKFMYoIo/exec";
let TOKEN="";
let DATA=[];

/* LOGIN */
async function login(){
const p=document.getElementById("pass").value;

let res=await fetch(API,{
method:"POST",
body:JSON.stringify({action:"login",password:p})
});

let d=await res.json();

if(d.status=="success"){
TOKEN=d.token;
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
load();
}
}

/* LOAD DATA */
async function load(){
let res=await fetch(API,{
method:"POST",
body:JSON.stringify({action:"getData",token:TOKEN})
});

let d=await res.json();

DATA=d.data.slice(1);

render();
}

/* RENDER */
function render(){

let paid=0,pending=0;
let html="";

DATA.forEach((r,i)=>{

let sal=Number(r[5]);

if(r[6]=="Paid") paid+=sal;
else pending+=sal;

html+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[4]}</td>
<td>${sal}</td>
<td>${r[6]}</td>
<td><button class="btn btn-blue" onclick="pdfSlip(${i})">PDF</button></td>
</tr>`;
});

document.getElementById("table").innerHTML=html;

document.getElementById("t1").innerText=DATA.length;
document.getElementById("t2").innerText=paid;
document.getElementById("t3").innerText=pending;
document.getElementById("t4").innerText=DATA.length;

chart(paid,pending);
}

/* AUTO REFRESH */
setInterval(()=>{ if(TOKEN) load(); },30000);

/* CHART */
function chart(paid,pending){
new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Paid","Pending"],
datasets:[{data:[paid,pending],backgroundColor:["green","red"]}]
}
});
}

/* PDF SALARY SLIP */
function pdfSlip(i){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let r = DATA[i];

doc.text("KALYANI DEVI SCHOOL OF EDUCATION",10,10);
doc.text("Salary Slip",10,20);

doc.text("Name: "+r[0],10,40);
doc.text("ID: "+r[1],10,50);
doc.text("Month: "+r[4],10,60);
doc.text("Salary: "+r[5],10,70);
doc.text("Status: "+r[6],10,80);

doc.save(r[0]+"_salary.pdf");
}

/* MONTHLY REPORT */
function downloadMonthlyPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("MONTHLY SALARY REPORT",10,10);

let y=30;

DATA.forEach(r=>{
doc.text(r[0]+" | "+r[4]+" | "+r[5]+" | "+r[6],10,y);
y+=10;
});

doc.save("monthly_report.pdf");
}

/* MANUAL REFRESH */
function refreshData(){
load();
}

</script>

</body>
</html>
