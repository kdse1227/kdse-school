<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>KDSE Admission Analytics - Secure</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Noto Sans Devanagari', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }

.language-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  background: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  z-index: 100;
}

.login-container {
  max-width: 400px;
  margin: 80px auto;
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  text-align: center;
}

.login-container h1 {
  color: #228B22;
  font-size: 28px;
  margin-bottom: 8px;
  font-weight: 700;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.password-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.password-input-wrapper input {
  flex: 1;
  padding: 12px 14px;
  border: 2px solid #e0e0e0;
  border-radius: 6px;
  font-size: 14px;
}

.password-toggle {
  position: absolute;
  right: 12px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: #999;
  padding: 5px;
}

.login-form button {
  padding: 12px;
  background: #228B22;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.login-form button:disabled {
  background: #bbb;
  cursor: not-allowed;
}

.error-msg, .success-msg {
  font-size: 13px;
  text-align: center;
  display: none;
  padding: 8px;
  border-radius: 4px;
  word-wrap: break-word;
}

.error-msg.show {
  display: block;
  color: #c62828;
  background: #ffebee;
}

.success-msg.show {
  display: block;
  color: #228B22;
  background: #e8f5e9;
}

.header {
  background: white;
  padding: 30px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  color: #228B22;
  font-size: 32px;
  font-weight: 700;
}

.logout-btn {
  padding: 10px 20px;
  background: #c62828;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: 700;
  cursor: pointer;
  font-size: 13px;
}

.analytics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card-header {
  font-size: 13px;
  font-weight: 700;
  color: #666;
  margin-bottom: 12px;
  text-transform: uppercase;
  border-bottom: 3px solid;
  padding-bottom: 12px;
}

.card.total-card .card-header { border-bottom-color: #228B22; color: #228B22; }
.card.male-card .card-header { border-bottom-color: #3498db; color: #3498db; }
.card.female-card .card-header { border-bottom-color: #e74c3c; color: #e74c3c; }
.card.other-card .card-header { border-bottom-color: #f39c12; color: #f39c12; }

.card-value {
  font-size: 48px;
  font-weight: 900;
  margin: 16px 0;
}

.card.total-card .card-value { color: #228B22; }
.card.male-card .card-value { color: #3498db; }
.card.female-card .card-value { color: #e74c3c; }
.card.other-card .card-value { color: #f39c12; }

.card-subtitle {
  font-size: 13px;
  color: #999;
}

.chart-wrapper {
  position: relative;
  height: 350px;
  margin: 20px 0;
}

.stat-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #f5f5f5;
}

.stat-label { font-size: 14px; color: #333; font-weight: 600; flex: 1; }
.stat-value { font-size: 18px; font-weight: 900; color: #228B22; }

.search-filter {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.search-filter input,
.search-filter select {
  padding: 10px 14px;
  border: 2px solid #e0e0e0;
  border-radius: 6px;
  font-size: 13px;
}

.table-container {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-bottom: 20px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

thead {
  background: #228B22;
  color: white;
}

th, td {
  padding: 14px 16px;
  text-align: left;
  font-size: 13px;
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
}

tbody tr:hover { background: #f9f9f9; }

.button-group {
  text-align: center;
  margin: 30px 0;
  display: flex;
  justify-content: center;
  gap: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 11px 24px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  color: white;
}

.btn-primary { background: #228B22; }
.btn-secondary { background: #667eea; }

.loading {
  text-align: center;
  padding: 60px 20px;
  color: white;
  font-size: 16px;
}

.spinner {
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@media (max-width: 768px) {
  .header { flex-direction: column; gap: 16px; }
  .logout-btn { width: 100%; }
  .language-toggle { top: 60px; }
}
</style>
</head>
<body>

<!-- LANGUAGE TOGGLE -->
<button class="language-toggle" id="langToggle" onclick="toggleLanguage()">English</button>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
  <h1>🔒 <span id="loginTitle">Analytics</span></h1>
  <p id="loginSubtitle">Admin Access Only</p>
  
  <div class="login-form">
    <div class="password-input-wrapper">
      <input type="password" id="passwordInput" placeholder="Enter Password">
      <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">👁️</button>
    </div>
    <button id="loginBtn" onclick="loginUser()"><span id="loginBtnText">Login</span></button>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
  </div>
</div>

<!-- ANALYTICS PAGE -->
<div id="analyticsPage" style="display: none;">
  <div class="container">
    <div class="header">
      <div>
        <h1>📊 KDSE Analytics</h1>
        <p id="headerSubtitle">Admission Form Submissions</p>
      </div>
      <button class="logout-btn" onclick="logoutUser()" id="logoutBtn">Logout</button>
    </div>

    <div id="loadingState" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p id="loadingText">Loading...</p>
    </div>

    <div id="analyticsContent" style="display: none;">
      <!-- STAT CARDS -->
      <div class="analytics-grid">
        <div class="card total-card">
          <div class="card-header" id="h1">Total Forms</div>
          <div class="card-value" id="totalForms">0</div>
          <div class="card-subtitle">Total Submissions</div>
        </div>
        <div class="card male-card">
          <div class="card-header">👨 <span id="h2">Boys</span></div>
          <div class="card-value" id="maleCount">0</div>
          <div class="card-subtitle" id="malePercent">0%</div>
        </div>
        <div class="card female-card">
          <div class="card-header">👩 <span id="h3">Girls</span></div>
          <div class="card-value" id="femaleCount">0</div>
          <div class="card-subtitle" id="femalePercent">0%</div>
        </div>
        <div class="card other-card">
          <div class="card-header">👥 <span id="h4">Other</span></div>
          <div class="card-value" id="otherCount">0</div>
          <div class="card-subtitle" id="otherPercent">0%</div>
        </div>
      </div>

      <!-- GENDER CHART -->
      <div class="card">
        <div class="card-header" id="h5">Gender Distribution</div>
        <div class="chart-wrapper">
          <canvas id="genderChart"></canvas>
        </div>
      </div>

      <!-- CLASS CHART -->
      <div class="card">
        <div class="card-header" id="h6">Class Distribution</div>
        <div class="chart-wrapper">
          <canvas id="classChart"></canvas>
        </div>
      </div>

      <!-- CLASS STATS -->
      <div class="card">
        <div class="card-header" id="h7">Class Stats</div>
        <div id="classStats"></div>
      </div>

      <!-- SEARCH -->
      <div class="search-filter">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterTable()">
        <select id="classFilter" onchange="filterTable()">
          <option value="">All Classes</option>
          <option value="KG">KG</option>
          <option value="I">I</option>
          <option value="II">II</option>
          <option value="III">III</option>
          <option value="IV">IV</option>
          <option value="V">V</option>
          <option value="VI">VI</option>
          <option value="VII">VII</option>
          <option value="VIII">VIII</option>
          <option value="IX">IX</option>
          <option value="X">X</option>
          <option value="XI">XI</option>
          <option value="XII">XII</option>
        </select>
        <select id="genderFilter" onchange="filterTable()">
          <option value="">All Genders</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Timestamp</th>
              <th>Student Name</th>
              <th>Father Name</th>
              <th>Class</th>
              <th>DOB</th>
              <th>Gender</th>
              <th>Caste</th>
              <th>Blood Group</th>
            </tr>
          </thead>
          <tbody id="recentSubmissions"></tbody>
        </table>
      </div>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" onclick="refreshData()">🔄 <span id="refreshText">Refresh</span></button>
      <button class="btn btn-secondary" onclick="exportAsCSV()">📥 <span id="downloadText">Download CSV</span></button>
    </div>
  </div>
</div>

<script>
// ========== LANGUAGE ==========
let currentLanguage = localStorage.getItem('lang') || 'en';

const translations = {
  en: {
    loginTitle: 'Analytics',
    loginSubtitle: 'Admin Access Only',
    loginBtnText: 'Login',
    logoutBtn: 'Logout',
    headerSubtitle: 'Admission Form Submissions',
    loadingText: 'Loading...',
    h1: 'Total Forms',
    h2: 'Boys',
    h3: 'Girls',
    h4: 'Other',
    h5: 'Gender Distribution',
    h6: 'Class Distribution',
    h7: 'Class Stats',
    refreshText: 'Refresh',
    downloadText: 'Download CSV'
  },
  hi: {
    loginTitle: 'विश्लेषण',
    loginSubtitle: 'केवल प्रशासक पहुँच',
    loginBtnText: 'लॉगिन करें',
    logoutBtn: 'लॉग आउट करें',
    headerSubtitle: 'आवेदन फॉर्म जमा',
    loadingText: 'लोड हो रहा है...',
    h1: 'कुल फॉर्म',
    h2: 'लड़के',
    h3: 'लड़कियां',
    h4: 'अन्य',
    h5: 'लिंग वितरण',
    h6: 'कक्षा वितरण',
    h7: 'कक्षा सांख्यिकी',
    refreshText: 'ताज़ा करें',
    downloadText: 'CSV डाउनलोड करें'
  }
};

function toggleLanguage() {
  currentLanguage = currentLanguage === 'en' ? 'hi' : 'en';
  localStorage.setItem('lang', currentLanguage);
  updateLanguage();
  document.getElementById('langToggle').textContent = currentLanguage === 'en' ? 'हिंदी' : 'English';
}

function updateLanguage() {
  const t = translations[currentLanguage];
  document.getElementById('loginTitle').textContent = t.loginTitle;
  document.getElementById('loginSubtitle').textContent = t.loginSubtitle;
  document.getElementById('loginBtnText').textContent = t.loginBtnText;
  document.getElementById('logoutBtn').textContent = t.logoutBtn;
  document.getElementById('headerSubtitle').textContent = t.headerSubtitle;
  document.getElementById('loadingText').textContent = t.loadingText;
  document.getElementById('h1').textContent = t.h1;
  document.getElementById('h2').textContent = t.h2;
  document.getElementById('h3').textContent = t.h3;
  document.getElementById('h4').textContent = t.h4;
  document.getElementById('h5').textContent = t.h5;
  document.getElementById('h6').textContent = t.h6;
  document.getElementById('h7').textContent = t.h7;
  document.getElementById('refreshText').textContent = t.refreshText;
  document.getElementById('downloadText').textContent = t.downloadText;
}

// ========== CONFIG ==========
const GAS_URL = "https://script.google.com/macros/s/AKfycbwzkLcX4pUctjh0c2uIEjXJZhHQQYSb14DidLVioFgQ7lxRa786XP3mBJs3czF1BVAp/exec";
const COLUMN_MAP = {
  id: 0, timestamp: 1, name: 2, fatherName: 4, class: 8, 
  dob: 9, gender: 10, caste: 11, bloodGroup: 12
};

// ========== STATE ==========
let authToken = null;
let allData = [];
let filteredData = [];
let chartInstances = {};

// ========== PASSWORD TOGGLE ==========
function togglePasswordVisibility() {
  const input = document.getElementById('passwordInput');
  const btn = event.target;
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

// ========== LOGIN ==========
function handleEnter(e) {
  if (e.key === 'Enter') loginUser();
}

document.getElementById('passwordInput').addEventListener('keypress', handleEnter);

async function loginUser() {
  const password = document.getElementById('passwordInput').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const loginBtn = document.getElementById('loginBtn');
  
  if (!password) {
    showError(errorMsg, '❌ Password required');
    return;
  }
  
  loginBtn.disabled = true;
  showSuccess(successMsg, '🔐 Logging in...');
  
  try {
    console.log('Sending login request to:', GAS_URL);
    console.log('Password:', password);
    
    const response = await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ 
        action: 'login', 
        password: password 
      })
    });
    
    console.log('Response status:', response.status);
    
    // With no-cors mode, we can't read the response directly
    // So we'll accept the request if it doesn't error
    showSuccess(successMsg, '✅ Login successful! Loading data...');
    
    // Generate a temporary token
    authToken = 'token_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    sessionStorage.setItem('authToken', authToken);
    sessionStorage.setItem('tokenTime', Date.now());
    sessionStorage.setItem('password', password);
    
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('analyticsPage').style.display = 'block';
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('analyticsContent').style.display = 'none';
    document.getElementById('passwordInput').value = '';
    
    setTimeout(() => {
      loadAnalytics(password);
    }, 500);
    
  } catch(error) {
    console.error('Login error:', error);
    showError(errorMsg, '❌ Connection error. Check URL and try again.');
  } finally {
    loginBtn.disabled = false;
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}

function showSuccess(el, msg) {
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}

// ========== LOGOUT ==========
function logoutUser() {
  authToken = null;
  sessionStorage.removeItem('authToken');
  sessionStorage.removeItem('tokenTime');
  sessionStorage.removeItem('password');
  
  Object.values(chartInstances).forEach(chart => {
    if (chart) chart.destroy();
  });
  chartInstances = {};
  
  document.getElementById('analyticsPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('passwordInput').value = '';
  document.getElementById('passwordInput').focus();
}

// ========== AUTO-LOGIN ON REFRESH ==========
window.addEventListener('load', function() {
  updateLanguage();
  document.getElementById('langToggle').textContent = currentLanguage === 'en' ? 'हिंदी' : 'English';
  
  const savedToken = sessionStorage.getItem('authToken');
  const tokenTime = sessionStorage.getItem('tokenTime');
  const savedPassword = sessionStorage.getItem('password');

  if (savedToken && tokenTime && savedPassword && (Date.now() - parseInt(tokenTime) < 3600000)) {
    authToken = savedToken;
    
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('analyticsPage').style.display = 'block';
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('analyticsContent').style.display = 'none';

    setTimeout(() => {
      loadAnalytics(savedPassword);
    }, 500);
  } else {
    sessionStorage.removeItem('authToken');
    sessionStorage.removeItem('tokenTime');
    sessionStorage.removeItem('password');
  }

  document.getElementById('passwordInput').focus();
});

// ========== LOAD DATA ==========
async function loadAnalytics(password) {
  if (!authToken) {
    alert('Session expired!');
    logoutUser();
    return;
  }
  
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('analyticsContent').style.display = 'none';
  
  try {
    console.log('Fetching data...');
    
    const response = await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ 
        action: 'getData', 
        password: password
      })
    });
    
    console.log('Data response status:', response.status);
    
    // Since we're using no-cors, we'll try to parse response
    const text = await response.text();
    console.log('Response text:', text);
    
    let result;
    try {
      result = JSON.parse(text);
    } catch(e) {
      console.log('Response is not JSON, trying to continue...');
      // If we get here, try to fetch from alternate method
      await fetchDataAlternate(password);
      return;
    }
    
    if (result.status === 'success' && result.data) {
      const headers = result.data[0] || [];
      updateColumnMap(headers);
      
      allData = result.data.slice(1);
      filteredData = [...allData];
      
      displayAnalytics();
      
      document.getElementById('analyticsContent').style.display = 'block';
      document.getElementById('loadingState').style.display = 'none';
    } else {
      alert('Error: ' + (result.message || 'Failed to load'));
      logoutUser();
    }
  } catch(error) {
    console.error('Data fetch error:', error);
    // Try alternate method
    await fetchDataAlternate(password);
  }
}

// Alternate fetch method with CORS handling
async function fetchDataAlternate(password) {
  try {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ 
        action: 'getData', 
        password: password
      })
    });
    
    const result = await response.json();
    
    if (result.status === 'success' && result.data) {
      const headers = result.data[0] || [];
      updateColumnMap(headers);
      
      allData = result.data.slice(1);
      filteredData = [...allData];
      
      displayAnalytics();
      
      document.getElementById('analyticsContent').style.display = 'block';
      document.getElementById('loadingState').style.display = 'none';
    } else {
      throw new Error(result.message || 'Failed to load');
    }
  } catch(error) {
    console.error('Alternate fetch error:', error);
    alert('Error: ' + error.message);
    logoutUser();
  }
}

function updateColumnMap(headers) {
  headers.forEach((header, index) => {
    const h = header.toLowerCase().trim();
    if (h.includes('form id')) COLUMN_MAP.id = index;
    if (h.includes('timestamp')) COLUMN_MAP.timestamp = index;
    if (h.includes('student name')) COLUMN_MAP.name = index;
    if (h.includes('father name')) COLUMN_MAP.fatherName = index;
    if (h === 'class') COLUMN_MAP.class = index;
    if (h.includes('dob')) COLUMN_MAP.dob = index;
    if (h.includes('gender')) COLUMN_MAP.gender = index;
    if (h.includes('caste')) COLUMN_MAP.caste = index;
    if (h.includes('blood')) COLUMN_MAP.bloodGroup = index;
  });
}

function displayAnalytics() {
  const stats = calculateStats(allData);
  
  document.getElementById('totalForms').textContent = stats.total;
  document.getElementById('maleCount').textContent = stats.male;
  document.getElementById('femaleCount').textContent = stats.female;
  document.getElementById('otherCount').textContent = stats.other;
  
  document.getElementById('malePercent').textContent = stats.malePercent + '%';
  document.getElementById('femalePercent').textContent = stats.femalePercent + '%';
  document.getElementById('otherPercent').textContent = stats.otherPercent + '%';
  
  displayGenderChart(stats);
  displayClassChart(stats.classWise);
  displayClassStats(stats.classWise);
  displayRecentSubmissions(filteredData);
}

function calculateStats(data) {
  const stats = {
    total: 0, male: 0, female: 0, other: 0,
    classWise: {}
  };
  
  data.forEach(row => {
    if (!row || row.length === 0) return;
    stats.total++;
    
    const gender = (row[COLUMN_MAP.gender] || '').trim().toLowerCase();
    if (gender === 'male') stats.male++;
    else if (gender === 'female') stats.female++;
    else if (gender === 'other' || gender === 'prefer not to say') stats.other++;
    
    const classVal = row[COLUMN_MAP.class] || 'Unknown';
    stats.classWise[classVal] = (stats.classWise[classVal] || 0) + 1;
  });
  
  stats.malePercent = stats.total > 0 ? Math.round((stats.male / stats.total) * 100) : 0;
  stats.femalePercent = stats.total > 0 ? Math.round((stats.female / stats.total) * 100) : 0;
  stats.otherPercent = stats.total > 0 ? Math.round((stats.other / stats.total) * 100) : 0;
  
  return stats;
}

function displayGenderChart(stats) {
  const ctx = document.getElementById('genderChart').getContext('2d');
  
  if (chartInstances.gender) chartInstances.gender.destroy();
  
  if (stats.total === 0) {
    ctx.canvas.parentElement.innerHTML = '<div style="text-align: center; padding: 100px 0; color: #999;">No data</div>';
    return;
  }
  
  chartInstances.gender = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Male', 'Female', 'Other'],
      datasets: [{
        label: 'Count',
        data: [stats.male, stats.female, stats.other],
        backgroundColor: ['#3498db', '#e74c3c', '#f39c12'],
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

function displayClassChart(classWise) {
  const ctx = document.getElementById('classChart').getContext('2d');
  
  if (chartInstances.class) chartInstances.class.destroy();
  
  if (Object.keys(classWise).length === 0) {
    ctx.canvas.parentElement.innerHTML = '<div style="text-align: center; padding: 100px 0; color: #999;">No data</div>';
    return;
  }
  
  const order = ['KG', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII'];
  const sorted = Object.entries(classWise).sort((a, b) => order.indexOf(a[0]) - order.indexOf(b[0]));
  
  chartInstances.class = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(([key]) => key),
      datasets: [{
        label: 'Students',
        data: sorted.map(([, val]) => val),
        backgroundColor: '#228B22',
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

function displayClassStats(classWise) {
  const container = document.getElementById('classStats');
  const total = Object.values(classWise).reduce((a, b) => a + b, 0);
  const order = ['KG', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII'];
  
  if (total === 0) {
    container.innerHTML = '<p>No data</p>';
    return;
  }
  
  container.innerHTML = Object.entries(classWise)
    .sort((a, b) => order.indexOf(a[0]) - order.indexOf(b[0]))
    .map(([classVal, count]) => {
      const percent = Math.round((count / total) * 100);
      return `<div class="stat-item"><span class="stat-label">${classVal}</span><span class="stat-value">${count}</span> (${percent}%)</div>`;
    })
    .join('');
}

function displayRecentSubmissions(data) {
  const container = document.getElementById('recentSubmissions');
  
  if (!data || data.length === 0) {
    container.innerHTML = '<tr><td colspan="9" style="text-align: center;">No data</td></tr>';
    return;
  }
  
  container.innerHTML = [...data].reverse().slice(0, 50)
    .map(row => `
      <tr>
        <td>${row[COLUMN_MAP.id] || '-'}</td>
        <td>${row[COLUMN_MAP.timestamp] || '-'}</td>
        <td style="font-family: 'Segoe UI', Roboto, Arial, sans-serif;">${row[COLUMN_MAP.name] || '-'}</td>
        <td style="font-family: 'Segoe UI', Roboto, Arial, sans-serif;">${row[COLUMN_MAP.fatherName] || '-'}</td>
        <td>${row[COLUMN_MAP.class] || '-'}</td>
        <td>${formatDOB(row[COLUMN_MAP.dob])}</td>
        <td>${row[COLUMN_MAP.gender] || '-'}</td>
        <td style="font-family: 'Segoe UI', Roboto, Arial, sans-serif;">${row[COLUMN_MAP.caste] || '-'}</td>
        <td>${row[COLUMN_MAP.bloodGroup] || '-'}</td>
      </tr>
    `)
    .join('');
}

function formatDOB(dob) {
  if (!dob) return '-';
  const date = new Date(dob);
  if (isNaN(date.getTime())) return dob;
  const day = String(date.getDate()).padStart(2, '0');
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const year = date.getFullYear();
  return `${day}/${month}/${year}`;
}

function filterTable() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const classFilter = document.getElementById('classFilter').value;
  const genderFilter = document.getElementById('genderFilter').value;

  filteredData = allData.filter(row => {
    const id = (row[COLUMN_MAP.id] || '').toString();
    const name = (row[COLUMN_MAP.name] || '').toLowerCase();
    const classVal = row[COLUMN_MAP.class] || '';
    const gender = (row[COLUMN_MAP.gender] || '').toLowerCase();

    const matchesSearch = id.includes(searchTerm) || name.includes(searchTerm) || classVal.includes(searchTerm);
    const matchesClass = !classFilter || classVal === classFilter;
    const matchesGender = !genderFilter || gender === genderFilter.toLowerCase();

    return matchesSearch && matchesClass && matchesGender;
  });

  displayRecentSubmissions(filteredData);
}

function refreshData() {
  const password = sessionStorage.getItem('password');
  if (password) {
    loadAnalytics(password);
  }
}

function exportAsCSV() {
  if (allData.length === 0) {
    alert('No data to export');
    return;
  }
  
  let csv = 'ID,Timestamp,Student Name,Class,Gender,Caste,Blood Group\n';
  
  allData.forEach(row => {
    const values = [
      row[COLUMN_MAP.id] || '',
      row[COLUMN_MAP.timestamp] || '',
      row[COLUMN_MAP.name] || '',
      row[COLUMN_MAP.class] || '',
      row[COLUMN_MAP.gender] || '',
      row[COLUMN_MAP.caste] || '',
      row[COLUMN_MAP.bloodGroup] || ''
    ];
    
    csv += values.map(cell => {
      const cellStr = String(cell).trim();
      if (cellStr.includes(',') || cellStr.includes('"')) {
        return `"${cellStr.replace(/"/g, '""')}"`;
      }
      return cellStr;
    }).join(',') + '\n';
  });
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `KDSE_Analytics_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
}
</script>
